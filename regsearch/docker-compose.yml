services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      CLIENT_URL: http://localhost:5173
    volumes:
      # Persist downloaded ONNX models so they aren't refetched on restart.
      - fastembed_cache:/home/app/.cache/fastembed
    depends_on:
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Browser runs on the host, so it reaches the backend at the mapped port.
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  fastembed_cache:
# After the stack is up, seed the dense index once:
#   docker compose exec backend python -m scripts.seed
