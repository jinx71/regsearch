server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths serve index.html so client-side
    # routing (react-router) handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; they're content-addressed.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
